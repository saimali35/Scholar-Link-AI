<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScholarLink AI - Register</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brandBlue: '#3b82f6',
            brandPurple: '#8b5cf6',
          }
        }
      }
    }
  </script>
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-[#0b0f19] text-[#f3f4f6] min-h-screen relative flex flex-col justify-between overflow-x-hidden">
  <!-- Background Decorative Glowing Blobs -->
  <div class="absolute top-[-20%] left-[-10%] w-[500px] h-[500px] rounded-full bg-blue-900/10 blur-[120px] animate-pulse-slow"></div>
  <div class="absolute bottom-[-10%] right-[-10%] w-[500px] h-[500px] rounded-full bg-purple-900/10 blur-[120px] animate-pulse-slow" style="animation-delay: 2s;"></div>
  <!-- Header -->
  <header class="py-6 px-6 md:px-12 flex justify-between items-center relative z-10">
    <a href="index.html" class="flex items-center space-x-3 group">
      <div class="bg-gradient-to-tr from-brandBlue to-brandPurple p-2 rounded-xl group-hover:scale-105 transition">
        <i class="fa-solid fa-graduation-cap text-white text-lg"></i>
      </div>
      <span class="text-lg font-bold tracking-tight text-white">ScholarLink<span class="text-indigo-400">AI</span></span>
    </a>
    <a href="index.html" class="text-sm text-gray-400 hover:text-white transition flex items-center space-x-2">
      <i class="fa-solid fa-arrow-left"></i>
      <span>Back to Home</span>
    </a>
  </header>
  <!-- Register Main -->
  <main class="flex-grow flex items-center justify-center p-6 relative z-10">
    <div class="w-full max-w-md glass-panel rounded-3xl p-8 border border-white/10 shadow-2xl">
      <div class="text-center mb-8">
        <h1 class="text-3xl font-extrabold text-white mb-2">Create Account</h1>
        <p class="text-gray-400 text-sm">Join ScholarLink AI to unlock tailored scholarships</p>
      </div>
      <!-- Error Message Container -->
      <div id="error-alert" class="hidden bg-red-950/50 border border-red-500/30 text-red-300 text-sm rounded-xl p-3.5 mb-6 flex items-center space-x-2">
        <i class="fa-solid fa-triangle-exclamation"></i>
        <span id="error-message">Invalid configuration.</span>
      </div>
      <form id="register-form" class="space-y-4">
        <div>
          <label for="name" class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Full Name</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-gray-500">
              <i class="fa-solid fa-user"></i>
            </div>
            <input type="text" id="name" required placeholder="John Doe" class="w-full pl-10 pr-4 py-3 rounded-xl glass-input text-sm focus:outline-none">
          </div>
        </div>
        <div>
          <label for="email" class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Email Address</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-gray-500">
              <i class="fa-solid fa-envelope"></i>
            </div>
            <input type="email" id="email" required placeholder="you@example.com" class="w-full pl-10 pr-4 py-3 rounded-xl glass-input text-sm focus:outline-none">
          </div>
        </div>
        <div>
          <label for="password" class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Password</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-gray-500">
              <i class="fa-solid fa-lock"></i>
            </div>
            <input type="password" id="password" required placeholder="••••••••" class="w-full pl-10 pr-4 py-3 rounded-xl glass-input text-sm focus:outline-none">
          </div>
        </div>
        <div>
          <label for="confirm-password" class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Confirm Password</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-gray-500">
              <i class="fa-solid fa-circle-check"></i>
            </div>
            <input type="password" id="confirm-password" required placeholder="••••••••" class="w-full pl-10 pr-4 py-3 rounded-xl glass-input text-sm focus:outline-none">
          </div>
        </div>
        <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-indigo-600/20 transform hover:-translate-y-0.5 transition duration-150 mt-2">
          Create Account
        </button>
      </form>
      <div class="text-center mt-8 text-sm text-gray-400">
        Already have an account? 
        <a href="login.html" class="text-indigo-400 hover:text-indigo-300 font-semibold transition">Login here</a>
      </div>
    </div>
  </main>
  <!-- Footer -->
  <footer class="py-6 text-center text-gray-500 text-xs relative z-10 border-t border-white/5">
    &copy; 2026 ScholarLink AI. All rights reserved.
  </footer>
  <script src="js/db.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.getElementById('register-form').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      
      const errorAlert = document.getElementById('error-alert');
      const errorMessage = document.getElementById('error-message');
      
      errorAlert.classList.add('hidden');
      
      if (password !== confirmPassword) {
        errorMessage.textContent = "Passwords do not match!";
        errorAlert.classList.remove('hidden');
        return;
      }
      
      const result = Auth.register(name, email, password);
      if (result.success) {
        // First-time users go straight to profile setup to fill their academic parameters!
        window.location.href = "profile.html";
      } else {
        errorMessage.textContent = result.message;
        errorAlert.classList.remove('hidden');
      }
    });
    // Check if already authenticated
    if (Auth.isAuthenticated()) {
      window.location.href = "dashboard.html";
    }
  </script>
</body>
</html>
