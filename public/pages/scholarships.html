<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScholarLink AI - Explore Scholarships</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brandBlue: '#3b82f6',
            brandPurple: '#8b5cf6',
            darkBg: '#0b0f19',
          }
        }
      }
    }
  </script>
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-darkBg text-[#f3f4f6] min-h-screen flex flex-col md:flex-row">
  <!-- Sidebar Navigation -->
  <aside id="sidebar" class="w-full md:w-64 bg-[#090c14] border-r border-white/5 flex flex-col justify-between p-6 shrink-0 md:sticky md:top-0 md:h-screen">
    <div>
      <div class="flex items-center justify-between mb-8">
        <a href="index.html" class="flex items-center space-x-3">
          <div class="bg-gradient-to-tr from-brandBlue to-brandPurple p-2 rounded-xl">
            <i class="fa-solid fa-graduation-cap text-white text-lg"></i>
          </div>
          <span class="text-lg font-bold tracking-tight text-white">ScholarLink<span class="text-indigo-400">AI</span></span>
        </a>
        <button id="sidebar-close-btn" class="md:hidden text-gray-400 hover:text-white"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <nav class="space-y-1">
        <a href="dashboard.html" class="sidebar-link flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white font-medium text-sm">
          <i class="fa-solid fa-gauge w-5 text-center"></i>
          <span>Dashboard</span>
        </a>
        <a href="scholarships.html" class="sidebar-link active flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white font-medium text-sm">
          <i class="fa-solid fa-award w-5 text-center"></i>
          <span>Scholarships</span>
        </a>
        <a href="saved.html" class="sidebar-link flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white font-medium text-sm">
          <i class="fa-solid fa-bookmark w-5 text-center"></i>
          <span>Saved Items</span>
        </a>
        <a href="roadmap.html" class="sidebar-link flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white font-medium text-sm">
          <i class="fa-solid fa-map-location-dot w-5 text-center"></i>
          <span>Roadmap</span>
        </a>
        <a href="notifications.html" class="sidebar-link flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white font-medium text-sm">
          <i class="fa-solid fa-bell w-5 text-center"></i>
          <span>Notifications</span>
        </a>
        <a href="ai-assistant.html" class="sidebar-link flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white font-medium text-sm">
          <i class="fa-solid fa-robot w-5 text-center"></i>
          <span>AI Assistant</span>
        </a>
        <a href="profile.html" class="sidebar-link flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white font-medium text-sm">
          <i class="fa-solid fa-user w-5 text-center"></i>
          <span>Profile Setup</span>
        </a>
      </nav>
    </div>
    <div class="mt-8 border-t border-white/5 pt-4">
      <button onclick="Auth.logout()" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-red-400 hover:bg-red-950/20 hover:text-red-300 font-medium text-sm transition">
        <i class="fa-solid fa-right-from-bracket w-5 text-center"></i>
        <span>Logout</span>
      </button>
    </div>
  </aside>
  <!-- Main Content Panel -->
  <div class="flex-grow flex flex-col min-w-0">
    <!-- Top Header -->
    <header class="py-4 px-6 md:px-8 border-b border-white/5 flex items-center justify-between bg-[#0b0f19]/80 backdrop-blur-md sticky top-0 z-30">
      <div class="flex items-center space-x-4">
        <button id="sidebar-toggle-btn" class="md:hidden text-gray-400 hover:text-white text-xl"><i class="fa-solid fa-bars"></i></button>
        <h1 class="text-xl md:text-2xl font-extrabold text-white">Explore Scholarships</h1>
      </div>
      
      <div class="flex items-center space-x-4">
        <div class="hidden sm:flex flex-col text-right">
          <span id="user-display-name" class="text-sm font-semibold text-white">Loading...</span>
          <span id="user-display-email" class="text-xs text-gray-500">student@scholarlink.ai</span>
        </div>
        <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-brandBlue to-brandPurple flex items-center justify-center font-bold text-white shadow-md shadow-indigo-500/20">
          <span id="user-avatar-initials">S</span>
        </div>
      </div>
    </header>
    <!-- Main Container -->
    <main class="flex-grow p-6 md:p-8 space-y-6 max-w-7xl w-full mx-auto">
      
      <!-- Live Search & Filtering Panel -->
      <section class="glass-panel p-6 rounded-3xl border border-white/10 shadow-xl space-y-5">
        
        <!-- Search bar & Sorting -->
        <div class="flex flex-col md:flex-row gap-4">
          <div class="relative flex-grow">
            <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-gray-500">
              <i class="fa-solid fa-magnifying-glass"></i>
            </div>
            <input type="text" id="search-input" placeholder="Search by name, provider, tags, or keywords..." class="w-full pl-10 pr-4 py-3 rounded-xl glass-input text-sm focus:outline-none">
          </div>
          <div class="w-full md:w-56 shrink-0">
            <select id="sort-select" class="w-full p-3 rounded-xl glass-input text-sm focus:outline-none">
              <option value="matchScore-desc">Sort by: Match Score (High to Low)</option>
              <option value="deadline-asc">Sort by: Deadline (Nearest First)</option>
              <option value="amount-desc">Sort by: Amount (High to Low)</option>
            </select>
          </div>
        </div>
        <!-- Filters Expansion Toggle Button -->
        <div class="flex items-center justify-between border-t border-white/5 pt-4">
          <button id="toggle-filters-btn" class="text-xs font-bold text-indigo-400 hover:text-indigo-300 flex items-center space-x-1.5 transition">
            <i class="fa-solid fa-sliders"></i>
            <span>Advanced Filters</span>
            <i id="filters-chevron" class="fa-solid fa-chevron-down"></i>
          </button>
          <button id="clear-filters-btn" class="text-xs text-gray-500 hover:text-white transition">Clear All Filters</button>
        </div>
        <!-- Collapsible Filters Area -->
        <div id="advanced-filters" class="hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 border-t border-white/5 pt-4">
          <!-- Income Limit Filter -->
          <div>
            <label for="filter-income" class="block text-xs font-semibold text-gray-400 mb-2">Max Family Income Cap</label>
            <select id="filter-income" class="w-full p-3 rounded-xl glass-input text-sm">
              <option value="all">Any Income Bracket</option>
              <option value="300000">Below ₹3,00,000</option>
              <option value="600000">Below ₹6,00,000</option>
              <option value="1200000">Below ₹12,00,000</option>
              <option value="1500000">Below ₹15,00,000</option>
            </select>
          </div>
          
          <!-- Category Filter -->
          <div>
            <label for="filter-category" class="block text-xs font-semibold text-gray-400 mb-2">Category Restriction</label>
            <select id="filter-category" class="w-full p-3 rounded-xl glass-input text-sm">
              <option value="all">Any Category</option>
              <option value="General">General</option>
              <option value="OBC">OBC</option>
              <option value="SC">SC</option>
              <option value="ST">ST</option>
              <option value="EWS">EWS</option>
            </select>
          </div>
          <!-- Domicile State Filter -->
          <div>
            <label for="filter-state" class="block text-xs font-semibold text-gray-400 mb-2">Domicile restriction</label>
            <select id="filter-state" class="w-full p-3 rounded-xl glass-input text-sm">
              <option value="all">All States</option>
              <option value="Maharashtra">Maharashtra</option>
              <option value="Karnataka">Karnataka</option>
              <option value="Delhi">Delhi</option>
              <option value="Tamil Nadu">Tamil Nadu</option>
              <option value="Uttar Pradesh">Uttar Pradesh</option>
              <option value="West Bengal">West Bengal</option>
              <option value="Gujarat">Gujarat</option>
            </select>
          </div>
          <!-- Eligibility Filter Toggle -->
          <div>
            <label for="filter-eligibility" class="block text-xs font-semibold text-gray-400 mb-2">Match Status</label>
            <select id="filter-eligibility" class="w-full p-3 rounded-xl glass-input text-sm">
              <option value="all">Show All Grants</option>
              <option value="eligible">Eligible Matches Only (50%+)</option>
              <option value="ineligible">Ineligible Matches Only</option>
            </select>
          </div>
        </div>
      </section>
      <!-- Scholarships Cards Container -->
      <section id="scholarships-grid" class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <!-- Dynamically filled by scholarship.js -->
        <div class="lg:col-span-2 glass-panel p-12 text-center text-gray-400">
          <i class="fa-solid fa-spinner animate-spin text-2xl mb-4 text-indigo-400"></i>
          <p>Loading matching scholarships database...</p>
        </div>
      </section>
    </main>
  </div>
  <script src="server/config/db.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/scholarship.js"></script>
</body>
</html>
