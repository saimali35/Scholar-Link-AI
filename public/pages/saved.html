<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScholarLink AI - Saved & Applied Items</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brandBlue: '#3b82f6',
            brandPurple: '#8b5cf6',
            darkBg: '#0b0f19',
          }
        }
      }
    }
  </script>
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-darkBg text-[#f3f4f6] min-h-screen flex flex-col md:flex-row">
  <!-- Sidebar Navigation -->
  <aside id="sidebar" class="w-full md:w-64 bg-[#090c14] border-r border-white/5 flex flex-col justify-between p-6 shrink-0 md:sticky md:top-0 md:h-screen">
    <div>
      <div class="flex items-center justify-between mb-8">
        <a href="index.html" class="flex items-center space-x-3">
          <div class="bg-gradient-to-tr from-brandBlue to-brandPurple p-2 rounded-xl">
            <i class="fa-solid fa-graduation-cap text-white text-lg"></i>
          </div>
          <span class="text-lg font-bold tracking-tight text-white">ScholarLink<span class="text-indigo-400">AI</span></span>
        </a>
        <button id="sidebar-close-btn" class="md:hidden text-gray-400 hover:text-white"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <nav class="space-y-1">
        <a href="dashboard.html" class="sidebar-link flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white font-medium text-sm">
          <i class="fa-solid fa-gauge w-5 text-center"></i>
          <span>Dashboard</span>
        </a>
        <a href="scholarships.html" class="sidebar-link flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white font-medium text-sm">
          <i class="fa-solid fa-award w-5 text-center"></i>
          <span>Scholarships</span>
        </a>
        <a href="saved.html" class="sidebar-link active flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white font-medium text-sm">
          <i class="fa-solid fa-bookmark w-5 text-center"></i>
          <span>Saved Items</span>
        </a>
        <a href="roadmap.html" class="sidebar-link flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white font-medium text-sm">
          <i class="fa-solid fa-map-location-dot w-5 text-center"></i>
          <span>Roadmap</span>
        </a>
        <a href="notifications.html" class="sidebar-link flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white font-medium text-sm">
          <i class="fa-solid fa-bell w-5 text-center"></i>
          <span>Notifications</span>
        </a>
        <a href="ai-assistant.html" class="sidebar-link flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white font-medium text-sm">
          <i class="fa-solid fa-robot w-5 text-center"></i>
          <span>AI Assistant</span>
        </a>
        <a href="profile.html" class="sidebar-link flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white font-medium text-sm">
          <i class="fa-solid fa-user w-5 text-center"></i>
          <span>Profile Setup</span>
        </a>
      </nav>
    </div>
    <div class="mt-8 border-t border-white/5 pt-4">
      <button onclick="Auth.logout()" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-red-400 hover:bg-red-950/20 hover:text-red-300 font-medium text-sm transition">
        <i class="fa-solid fa-right-from-bracket w-5 text-center"></i>
        <span>Logout</span>
      </button>
    </div>
  </aside>
  <!-- Main Content Panel -->
  <div class="flex-grow flex flex-col min-w-0">
    <!-- Top Header -->
    <header class="py-4 px-6 md:px-8 border-b border-white/5 flex items-center justify-between bg-[#0b0f19]/80 backdrop-blur-md sticky top-0 z-30">
      <div class="flex items-center space-x-4">
        <button id="sidebar-toggle-btn" class="md:hidden text-gray-400 hover:text-white text-xl"><i class="fa-solid fa-bars"></i></button>
        <h1 class="text-xl md:text-2xl font-extrabold text-white">Saved & Applied Items</h1>
      </div>
      
      <div class="flex items-center space-x-4">
        <div class="hidden sm:flex flex-col text-right">
          <span id="user-display-name" class="text-sm font-semibold text-white">Loading...</span>
          <span id="user-display-email" class="text-xs text-gray-500">student@scholarlink.ai</span>
        </div>
        <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-brandBlue to-brandPurple flex items-center justify-center font-bold text-white shadow-md shadow-indigo-500/20">
          <span id="user-avatar-initials">S</span>
        </div>
      </div>
    </header>
    <!-- Main Container -->
    <main class="flex-grow p-6 md:p-8 space-y-6 max-w-7xl w-full mx-auto">
      
      <!-- Sub headers / Segment Controls -->
      <div class="flex space-x-4 border-b border-white/5 pb-1">
        <button id="tab-saved" class="px-4 py-2 text-sm font-bold text-white border-b-2 border-indigo-500 focus:outline-none">Saved Scholarships</button>
        <button id="tab-applied" class="px-4 py-2 text-sm font-bold text-gray-400 hover:text-white focus:outline-none">Applied Scholarships</button>
      </div>
      <!-- Content Grid -->
      <section id="saved-items-grid" class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <!-- Dynamically loaded -->
      </section>
    </main>
  </div>
  <script src="server/config/db.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Protect Page
      Auth.protectPage();
      const currentUser = Auth.getCurrentUser();
      const profile = DB.getProfile();
      // Populate Header User Info
      if (currentUser) {
        document.getElementById('user-display-name').textContent = currentUser.name;
        document.getElementById('user-display-email').textContent = currentUser.email;
        
        const initials = currentUser.name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
        document.getElementById('user-avatar-initials').textContent = initials;
      }
      // Tab Toggling
      const tabSaved = document.getElementById('tab-saved');
      const tabApplied = document.getElementById('tab-applied');
      let currentTab = 'saved'; // 'saved' or 'applied'
      tabSaved.addEventListener('click', () => {
        currentTab = 'saved';
        tabSaved.className = "px-4 py-2 text-sm font-bold text-white border-b-2 border-indigo-500 focus:outline-none";
        tabApplied.className = "px-4 py-2 text-sm font-bold text-gray-400 hover:text-white focus:outline-none";
        renderItems();
      });
      tabApplied.addEventListener('click', () => {
        currentTab = 'applied';
        tabApplied.className = "px-4 py-2 text-sm font-bold text-white border-b-2 border-indigo-500 focus:outline-none";
        tabSaved.className = "px-4 py-2 text-sm font-bold text-gray-400 hover:text-white focus:outline-none";
        renderItems();
      });
      const gridContainer = document.getElementById('saved-items-grid');
      function renderItems() {
        gridContainer.innerHTML = '';
        const savedIds = DB.getSavedScholarshipIds();
        const apps = DB.getApplications();
        if (currentTab === 'saved') {
          // Filter saved scholarships
          if (savedIds.length === 0) {
            gridContainer.innerHTML = `
              <div class="lg:col-span-2 glass-panel p-16 text-center text-gray-500 rounded-3xl border border-white/5">
                <i class="fa-regular fa-bookmark text-4xl mb-4 text-gray-600"></i>
                <p class="text-base font-semibold text-white">No saved scholarships</p>
                <p class="text-sm text-gray-400 mt-1">Explore scholarships and click the bookmark icon to save them here.</p>
                <a href="scholarships.html" class="inline-block mt-6 bg-indigo-600 hover:bg-indigo-500 text-white font-semibold text-xs px-5 py-2.5 rounded-xl transition">Explore Scholarships</a>
              </div>
            `;
            return;
          }
          savedIds.forEach(id => {
            const sch = DB.getScholarshipById(id);
            if (!sch) return;
            const analysis = DB.calculateMatchScore(sch, profile);
            const isApplied = apps.some(a => a.scholarshipId === id);
            const card = document.createElement('div');
            card.className = "glass-panel p-6 rounded-2xl border border-white/5 flex flex-col justify-between relative overflow-hidden h-full";
            card.innerHTML = `
              <div class="space-y-4 mb-6">
                <div class="flex items-center justify-between">
                  <span class="text-gray-500 text-xs font-semibold uppercase tracking-wider">${sch.provider}</span>
                  <span class="bg-indigo-950/40 text-indigo-300 text-xs px-2.5 py-1 rounded-full font-bold">${analysis.score}% Match</span>
                </div>
                <h4 class="text-lg font-bold text-white leading-snug">${sch.name}</h4>
                <p class="text-gray-400 text-xs line-clamp-2">${sch.description}</p>
                
                <div class="grid grid-cols-2 gap-4 border-t border-white/5 pt-4">
                  <div>
                    <div class="text-[10px] text-gray-500 font-semibold uppercase">Amount</div>
                    <div class="text-sm font-bold text-emerald-400 font-mono">${sch.amount}</div>
                  </div>
                  <div>
                    <div class="text-[10px] text-gray-500 font-semibold uppercase">Deadline</div>
                    <div class="text-sm font-semibold text-white font-mono">${sch.deadline}</div>
                  </div>
                </div>
              </div>
              <div class="flex items-center gap-2 pt-2 mt-auto">
                <button onclick="handleDetails('${sch.id}')" class="flex-grow bg-indigo-950 border border-indigo-500/20 hover:bg-indigo-900/50 text-indigo-300 text-xs font-semibold py-3 rounded-xl transition">
                  View Details & Apply
                </button>
                <button onclick="toggleRemove('${sch.id}')" class="p-3 rounded-xl border border-white/10 hover:border-red-500/30 text-gray-400 hover:text-red-500 hover:bg-red-500/5 transition" title="Remove from Saved">
                  <i class="fa-solid fa-trash-can text-sm"></i>
                </button>
              </div>
            `;
            gridContainer.appendChild(card);
          });
        } else {
          // Filter applied scholarships
          if (apps.length === 0) {
            gridContainer.innerHTML = `
              <div class="lg:col-span-2 glass-panel p-16 text-center text-gray-500 rounded-3xl border border-white/5">
                <i class="fa-solid fa-paper-plane text-4xl mb-4 text-gray-600"></i>
                <p class="text-base font-semibold text-white">No submitted applications</p>
                <p class="text-sm text-gray-400 mt-1">Open a scholarship card details page and click 'Apply Now' to simulate application states.</p>
                <a href="scholarships.html" class="inline-block mt-6 bg-indigo-600 hover:bg-indigo-500 text-white font-semibold text-xs px-5 py-2.5 rounded-xl transition">Find Match Matches</a>
              </div>
            `;
            return;
          }
          apps.forEach(app => {
            const sch = DB.getScholarshipById(app.scholarshipId);
            if (!sch) return;
            const card = document.createElement('div');
            card.className = "glass-panel p-6 rounded-2xl border border-white/5 flex flex-col justify-between relative overflow-hidden h-full";
            card.innerHTML = `
              <div class="space-y-4 mb-6">
                <div class="flex items-center justify-between">
                  <span class="text-gray-500 text-xs font-semibold uppercase tracking-wider">${sch.provider}</span>
                  <span class="bg-indigo-900/40 text-indigo-300 text-xs px-2.5 py-1 rounded-full font-bold">Applied</span>
                </div>
                <h4 class="text-lg font-bold text-white leading-snug">${sch.name}</h4>
                
                <!-- Application status details -->
                <div class="bg-slate-900/60 border border-white/5 p-4 rounded-xl space-y-3">
                  <div class="flex items-center justify-between text-xs">
                    <span class="text-gray-400">Application Date:</span>
                    <span class="text-white font-mono">${app.dateApplied}</span>
                  </div>
                  <div class="flex items-center justify-between text-xs">
                    <span class="text-gray-400">Current Phase:</span>
                    <span class="text-blue-400 font-semibold flex items-center"><span class="w-1.5 h-1.5 rounded-full bg-blue-500 mr-1.5 animate-pulse"></span> Under Document Review</span>
                  </div>
                  
                  <!-- Application Status Step Bar -->
                  <div class="space-y-1 pt-1">
                    <div class="flex justify-between text-[9px] text-gray-500 font-bold uppercase">
                      <span>Applied</span>
                      <span>Review</span>
                      <span>Disbursal</span>
                    </div>
                    <div class="w-full bg-slate-800 rounded-full h-1.5 overflow-hidden">
                      <div class="bg-blue-500 h-1.5 rounded-full" style="width: 50%"></div>
                    </div>
                  </div>
                </div>
              </div>
              <div class="flex items-center gap-2 pt-2 mt-auto">
                <button onclick="handleDetails('${sch.id}')" class="flex-grow bg-indigo-950 border border-indigo-500/20 hover:bg-indigo-900/50 text-indigo-300 text-xs font-semibold py-3 rounded-xl transition">
                  View Details
                </button>
                <button onclick="handleDeleteApp('${sch.id}')" class="p-3 rounded-xl border border-white/10 hover:border-red-500/30 text-gray-400 hover:text-red-500 hover:bg-red-500/5 transition" title="Withdraw Application">
                  <i class="fa-solid fa-ban text-sm"></i>
                </button>
              </div>
            `;
            gridContainer.appendChild(card);
          });
        }
      }
      // Global Callback actions
      window.handleDetails = (id) => {
        DB.setSelectedScholarshipId(id);
        window.location.href = "scholarship-details.html";
      };
      window.toggleRemove = (id) => {
        DB.toggleSaveScholarship(id);
        renderItems();
      };
      window.handleDeleteApp = (id) => {
        if (confirm("Are you sure you want to withdraw your scholarship application? This cannot be undone.")) {
          DB.removeApplication(id);
          renderItems();
        }
      };
      // Initial Render
      renderItems();
      // Responsive Sidebar Menu Toggle Handler
      const sidebar = document.getElementById('sidebar');
      const toggleBtn = document.getElementById('sidebar-toggle-btn');
      const closeBtn = document.getElementById('sidebar-close-btn');
      if (toggleBtn && sidebar) {
        toggleBtn.addEventListener('click', () => {
          sidebar.classList.remove('hidden');
          sidebar.classList.add('fixed', 'inset-y-0', 'left-0', 'z-50');
        });
      }
      if (closeBtn && sidebar) {
        closeBtn.addEventListener('click', () => {
          sidebar.classList.add('hidden');
          sidebar.classList.remove('fixed', 'inset-y-0', 'left-0', 'z-50');
        });
      }
    });
  </script>
</body>
</html>
